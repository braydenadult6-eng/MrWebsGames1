<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nova Games | Unblocked Vault</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              arcade: {
                bg: '#020617',
                card: '#0f172a',
                surface: '#020617',
                accent: '#4f46e9',
                hot: '#f43f5e',
                border: '#1e293b',
              }
            },
            fontFamily: {
              display: ['Space Grotesk', 'sans-serif'],
              sans: ['Inter', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      body {
        background-color: #020617;
        color: #f1f5f9;
        font-family: 'Inter', sans-serif;
      }
      .font-display { font-family: 'Space Grotesk', sans-serif; }
      
      .bento-card-base {
        position: relative;
        overflow: hidden;
        border-radius: 1.5rem;
        border-width: 1px;
        border-color: #1e293b;
        background-color: rgba(15, 23, 42, 0.5);
        backdrop-filter: blur(12px);
        transition-property: all;
        transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
        transition-duration: 300ms;
      }
      .bento-card-base:hover {
        border-color: rgba(79, 70, 229, 0.3);
      }

      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
      }
    </style>
  </head>
  <body class="min-h-screen flex flex-col p-4 md:p-6 gap-6">
    <div id="app" class="flex flex-col gap-6 flex-1">
      <!-- Content will be injected here by main.js -->
    </div>

    <!-- Modal for Games -->
    <div id="game-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-0 md:p-8">
      <div id="modal-backdrop" class="absolute inset-0 bg-slate-950/90 backdrop-blur-xl"></div>
      <div id="modal-content" class="relative w-full h-full bg-slate-900 border border-slate-800 md:rounded-3xl overflow-hidden flex flex-col scale-95 opacity-0 transition-all duration-300">
        <div class="p-4 border-b border-slate-800 flex items-center justify-between bg-slate-900/50">
          <div class="flex items-center gap-3">
            <div id="modal-game-icon" class="w-10 h-10 rounded-xl overflow-hidden border border-slate-800"></div>
            <div>
              <h2 id="modal-game-title" class="text-lg leading-none uppercase tracking-tight font-display font-bold">Game Title</h2>
              <p class="text-[10px] text-indigo-500 uppercase font-black tracking-widest mt-1">Live Feed</p>
            </div>
          </div>
          <div class="flex items-center gap-3">
            <button id="close-modal" class="p-2.5 bg-slate-800 hover:bg-rose-500 hover:text-white rounded-xl transition-all text-slate-400">
              <i data-lucide="x" class="w-5 h-5"></i>
            </button>
          </div>
        </div>
        <div class="flex-1 bg-black relative">
          <iframe id="game-iframe" src="" class="w-full h-full border-none" allow="autoplay; fullscreen; pointer-lock"></iframe>
        </div>
      </div>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
